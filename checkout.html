        <form id="checkout-form" class="contact-form">

            <input type="text" id="fullname" placeholder="Full Name" required>

<!-- ⭐ CHECKOUT VALIDATION SCRIPT ⭐ -->
<script>
document.getElementById("checkout-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("fullname").value.trim();
    const address = document.getElementById("address").value.trim();
    const city = document.getElementById("city").value.trim();
    const postcode = document.getElementById("postcode").value.trim();

    const card = document.getElementById("card-number").value.trim();
    const expiry = document.getElementById("expiry").value.trim();
    const cvv = document.getElementById("cvv").value.trim();

    let errors = [];

    // Basic field checks
    if (name.length < 3) errors.push("Full name must be at least 3 characters.");
    if (address.length < 5) errors.push("Address must be at least 5 characters.");
    if (city.length < 2) errors.push("City must be at least 2 characters.");
    if (postcode.length < 4) errors.push("Postcode must be at least 4 characters.");

    // Card number validation (Luhn algorithm)
    function luhnCheck(num) {
        let arr = num.split("").reverse().map(x => parseInt(x));
        let sum = arr.reduce((acc, val, i) => {
            if (i % 2 !== 0) {
                val *= 2;
                if (val > 9) val -= 9;
            }
            return acc + val;
        }, 0);
        return sum % 10 === 0;
    }

    if (card.length !== 16 || !/^\d+$/.test(card) || !luhnCheck(card)) {
        errors.push("Invalid card number.");
    }

    // Expiry validation
    if (!/^\d{2}\/\d{2}$/.test(expiry)) {
        errors.push("Expiry must be in MM/YY format.");
    } else {
        const [month, year] = expiry.split("/").map(Number);
        const now = new Date();
        const expiryDate = new Date(2000 + year, month);

        if (month < 1 || month > 12) {
            errors.push("Invalid expiry month.");
        }
        if (expiryDate < now) {
            errors.push("Card has expired.");
        }
    }

    // CVV validation
    if (!/^\d{3}$/.test(cvv)) {
        errors.push("CVV must be 3 digits.");
    }

    // Show errors or success
    if (errors.length > 0) {
        alert(errors.join("\n"));
    } else {
        alert("Payment successful! (Fake checkout)");
        window.location.href = "success.html";
    }
});
</script>
