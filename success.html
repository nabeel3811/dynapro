<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful - Dynapro</title>
    <link rel="stylesheet" href="STYLE.CSS">

    <style>
        /* Extra styling only for the success page */
        .success-container {
            width: 80%;
            margin: 60px auto;
            text-align: center;
            padding: 40px;
            background: white;
            border: 3px solid rgb(159, 209, 177);
            border-radius: 15px;
        }

        .success-check {
            font-size: 80px;
            color: rgb(0, 180, 0);
            margin-bottom: 20px;
            animation: pop 0.6s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }

        .success-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: black;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .success-btn:hover {
            background: rgb(40, 40, 40);
            transform: scale(1.05);
        }
    </style>
</head>
